<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Widget - Zero Scroll Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* すべての要素でスクロールと余計な計算を排除 */
        * {
            box-sizing: border-box;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE/Edge */
        }
        ::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        html, body { 
            background: transparent; 
            margin: 0 !important; 
            padding: 0 !important; 
            height: 100% !important; 
            width: 100% !important;
            overflow: hidden !important; /* 絶対にスクロールさせない */
            -webkit-text-size-adjust: 100%;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif; 
        }

        #root { 
            height: 100%; 
            width: 100%;
            display: flex; 
            justify-content: flex-start; 
            align-items: center; /* 縦方向中央に配置 */
            overflow: hidden !important;
        }
        
        .widget-panel {
            display: flex;
            gap: 1.8rem;
            align-items: center;
            background-color: #ffffff;
            border: 1.5px solid #e5e7eb; /* 影を消して枠線を少し強調 */
            border-radius: 12px;
            padding: 6px 20px; /* 上下をさらに圧縮 */
            position: relative;
            margin-left: 2px;
            /* 影を外に出さず、内側に少し入れることでスクロール誘発を防ぐ */
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
            max-height: 90px; /* 高さを物理的に制限 */
        }

        @media (max-width: 600px) {
            .widget-panel { 
                gap: 0.8rem; 
                padding: 4px 12px;
                transform: scale(0.95); /* スマホでは全体を少し縮小して安全圏に */
                transform-origin: left center;
            }
        }

        .minimal-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: none;
            background: transparent;
            outline: none;
            flex-shrink: 0;
        }

        .icon-wrapper {
            width: 36px; 
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #475569; 
            transition: color 0.3s ease;
        }

        .btn-naruhodo.has-count .icon-wrapper { color: #d97706; }
        .btn-yattemiru.has-count .icon-wrapper { color: #059669; }
        .btn-tensai.has-count .icon-wrapper { color: #7c3aed; }

        .flat-dot {
            position: absolute;
            top: -1px;
            right: -3px;
            background-color: #334155;
            color: white;
            font-size: 10px;
            font-weight: 900;
            height: 16px;
            min-width: 16px;
            padding: 0 4px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1.5px solid #fff;
            z-index: 10;
        }

        .has-count .flat-dot { background-color: #0f172a; }

        .minimal-label {
            margin-top: 0; 
            font-size: 10px; 
            font-weight: 800;
            color: #1e293b;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        .undo-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            z-index: 100;
            pointer-events: none; /* 下のボタンを邪魔しない */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, collection } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAvGBhHtPdR0qETpNh3eyYiVpAC0gYb2YU",
            authDomain: "uds-portal-tools.firebaseapp.com",
            projectId: "uds-portal-tools",
            storageBucket: "uds-portal-tools.firebasestorage.app",
            messagingSenderId: "1058352022068",
            appId: "1:1058352022068:web:70dcd97f1555d6a9d04061"
        };
        const APP_ID = "uds-portal-tools";

        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, collection, MY_FIREBASE_CONFIG, APP_ID };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DEFAULT_SETTING = {
            id: "default_page",
            title: "名称未設定ページ"
        };

        const Icons = {
            Naruhodo: ({ count }) => (
                <svg viewBox="0 0 24 24" className="w-8 h-8" 
                     fill={count > 0 ? "currentColor" : "none"} 
                     stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5" />
                    <path d="M9 18h6" fill="none" />
                    <path d="M10 22h4" fill="none" />
                </svg>
            ),
            Yattemiru: ({ count }) => (
                <svg viewBox="0 0 24 24" className="w-8 h-8" 
                     fill={count > 0 ? "currentColor" : "none"} 
                     stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M7 10v12" fill="none" />
                    <path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H7" />
                    <path d="M7 10H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h3" />
                    <path d="M14 10V4.5a2.5 2.5 0 0 0-5 0V10" fill="none" />
                </svg>
            ),
            Tensai: ({ count }) => (
                <svg viewBox="0 0 24 24" className="w-8 h-8" 
                     fill={count > 0 ? "currentColor" : "none"} 
                     stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 3l1.9 5.8a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3z" />
                    <path d="M19 4l.5 1.5a1 1 0 0 0 .7.7L21.7 6.7l-1.5.5a1 1 0 0 0-.7.7L19 9.4l-.5-1.5a1 1 0 0 0-.7-.7L16.3 6.7l1.5-.5a1 1 0 0 0 .7-.7z" />
                </svg>
            )
        };

        function App() {
            const [ready, setReady] = useState(false);
            const [user, setUser] = useState(null);
            const [pageId, setPageId] = useState("");
            const [pageTitle, setPageTitle] = useState("");
            const [stats, setStats] = useState({ learning: 0, clarity: 0, insight: 0 });
            const [allPages, setAllPages] = useState([]);
            const [view, setView] = useState('widget');
            const [confirmReset, setConfirmReset] = useState(null);
            const [undoVisible, setUndoVisible] = useState(false);
            const timerRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                setPageId(params.get('pid') || DEFAULT_SETTING.id);
                setPageTitle(params.get('ptitle') || DEFAULT_SETTING.title);
                if (params.get('mode') === 'admin') setView('admin');
            }, []);

            useEffect(() => {
                const interval = setInterval(() => { if (window.FirebaseSDK) { setReady(true); clearInterval(interval); } }, 100);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!ready) return;
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, MY_FIREBASE_CONFIG } = window.FirebaseSDK;
                const app = initializeApp(MY_FIREBASE_CONFIG);
                const auth = getAuth(app);
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, [ready]);

            useEffect(() => {
                if (!user || view !== 'widget' || !ready || !pageId) return;
                const { getFirestore, doc, onSnapshot, setDoc, APP_ID } = window.FirebaseSDK;
                const db = getFirestore();
                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'feedback', pageId);
                return onSnapshot(docRef, (snap) => {
                    if (snap.exists()) setStats(snap.data());
                    else setDoc(docRef, { learning: 0, clarity: 0, insight: 0, title: pageTitle, lastUpdated: Date.now() });
                });
            }, [user, view, ready, pageId]);

            useEffect(() => {
                if (!user || view !== 'admin' || !ready) return;
                const { getFirestore, collection, onSnapshot, APP_ID } = window.FirebaseSDK;
                const db = getFirestore();
                const colRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'feedback');
                return onSnapshot(colRef, (s) => setAllPages(s.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, [user, view, ready]);

            const handleAction = async (type) => {
                if (!user || !pageId) return;
                const { getFirestore, doc, updateDoc, increment, APP_ID } = window.FirebaseSDK;
                const db = getFirestore();
                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'feedback', pageId);
                await updateDoc(docRef, { [type]: increment(1), lastUpdated: Date.now(), title: pageTitle });
                setUndoVisible(true);
                if (timerRef.current) clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => setUndoVisible(false), 1500);
            };

            const resetPageStats = async (targetId) => {
                const { getFirestore, doc, updateDoc, APP_ID } = window.FirebaseSDK;
                const db = getFirestore();
                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'feedback', targetId);
                await updateDoc(docRef, { learning: 0, clarity: 0, insight: 0, lastUpdated: Date.now() });
                setConfirmReset(null);
            };

            const downloadCSV = () => {
                const head = ['タイトル', 'ID', 'なるほど', 'やってみる', '天才かよ', '最終更新'];
                const rows = allPages.map(p => [p.title, p.id, p.learning, p.clarity, p.insight, new Date(p.lastUpdated).toLocaleString()]);
                const csv = "\ufeff" + [head, ...rows].map(r => r.join(",")).join("\n");
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
                link.download = `uds_feedback_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

            if (view === 'admin') {
                return (
                    <div className="p-4 bg-gray-50 min-h-screen text-[12px] text-slate-800">
                        <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                <h2 className="font-bold text-sm">集計データ</h2>
                                <button onClick={downloadCSV} className="bg-slate-900 text-white px-3 py-1 rounded hover:bg-black transition text-[10px] font-bold">CSV出力</button>
                            </div>
                            <table className="w-full text-left">
                                <thead><tr className="bg-slate-50 text-slate-400 font-bold text-[9px] uppercase tracking-widest">
                                    <th className="p-3 border-b">タイトル / ID</th>
                                    <th className="p-3 border-b text-center">なるほど</th>
                                    <th className="p-3 border-b text-center">やってみる</th>
                                    <th className="p-3 border-b text-center">天才かよ</th>
                                    <th className="p-3 border-b text-right">操作</th>
                                </tr></thead>
                                <tbody>{allPages.map(p => (
                                    <tr key={p.id} className="border-b border-slate-50 hover:bg-blue-50/20 transition">
                                        <td className="p-3">
                                            <div className="font-bold text-slate-900 text-[11px]">{p.title || '無題'}</div>
                                            <div className="text-[9px] text-slate-400 font-mono">{p.id}</div>
                                        </td>
                                        <td className="p-3 text-center text-amber-600 font-bold">{p.learning || 0}</td>
                                        <td className="p-3 text-center text-emerald-600 font-bold">{p.clarity || 0}</td>
                                        <td className="p-3 text-center text-violet-600 font-bold">{p.insight || 0}</td>
                                        <td className="p-3 text-right">
                                            {confirmReset === p.id ? (
                                                <button onClick={() => resetPageStats(p.id)} className="bg-red-500 text-white px-2 py-0.5 rounded text-[9px] font-bold">確定</button>
                                            ) : (
                                                <button onClick={() => setConfirmReset(p.id)} className="text-gray-300 hover:text-red-400 text-[9px] font-bold">リセット</button>
                                            )}
                                        </td>
                                    </tr>
                                ))}</tbody>
                            </table>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-start items-center p-0 w-full select-none h-full overflow-hidden">
                    <div className="widget-panel">
                        <ReactionButton icon={Icons.Naruhodo} label="なるほど！" count={stats.learning} onClick={() => handleAction('learning')} className="btn-naruhodo" />
                        <ReactionButton icon={Icons.Yattemiru} label="やってみる" count={stats.clarity} onClick={() => handleAction('clarity')} className="btn-yattemiru" />
                        <ReactionButton icon={Icons.Tensai} label="天才かよ" count={stats.insight} onClick={() => handleAction('insight')} className="btn-tensai" />
                        {undoVisible && (
                            <div className="undo-toast">
                                <span>送信完了</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function ReactionButton({ icon: Icon, label, count, onClick, className }) {
            return (
                <button className={`minimal-btn group ${className} ${count > 0 ? 'has-count' : ''}`} onClick={onClick}>
                    <div className="icon-wrapper">
                        <div className="flat-dot">{count > 99 ? '99+' : count}</div>
                        <Icon count={count} />
                    </div>
                    <span className="minimal-label">{label}</span>
                </button>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
