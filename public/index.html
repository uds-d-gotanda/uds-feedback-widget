<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Widget - Full Featured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background: transparent; margin: 0; padding: 10px; font-family: "Inter", sans-serif; }
        #root { display: flex; justify-content: flex-start; }
        .widget-panel { display: inline-flex; gap: 2.5rem; align-items: flex-start; }
        .reaction-container { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
        
        .circle-btn {
            position: relative; width: 54px; height: 54px;
            background-color: #ffffff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: none; outline: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #D1D1D6; 
        }
        .ripple-wrapper { position: absolute; inset: 0; overflow: hidden; border-radius: 50%; pointer-events: none; }
        .ripple { position: absolute; background: currentColor; opacity: 0.15; border-radius: 50%; transform: scale(0); animation: ripple-animation 0.6s linear; pointer-events: none; }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        .circle-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12); }
        .circle-btn:active { transform: translateY(0px) scale(0.92); }

        .is-active.btn-naruhodo .circle-btn { color: #2DA44E !important; } 
        .is-active.btn-yattemiru .circle-btn { color: #E36209 !important; } 
        .is-active.btn-tensai .circle-btn { color: #0969DA !important; }   
        
        .flat-dot {
            position: absolute; top: -2px; right: -2px;
            background-color: #3a3a3c; color: #ffffff;
            font-size: 10px; font-weight: 700; padding: 1px 6px;
            border-radius: 10px; border: 2px solid #ffffff;
            min-width: 20px; text-align: center; z-index: 10;
        }
        .label { font-size: 11px; font-weight: 700; color: #636366; letter-spacing: -0.02em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, collection } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app-check.js';
        
        const config = {
            firebaseConfig: {
                apiKey: "AIzaSyAvGBhHtPdR0qETpNh3eyYiVpAC0gYb2YU",
                authDomain: "uds-portal-tools.firebaseapp.com",
                projectId: "uds-portal-tools",
                storageBucket: "uds-portal-tools.firebasestorage.app",
                messagingSenderId: "1058352022068",
                appId: "1:1058352022068:web:70dcd97f1555d6a9d04061"
            },
            RECAPTCHA_SITE_KEY: "6LdP-pYsAAAAAHEsYWrlb9vGGdyP4HQXI8H2_Ug8",
            APP_ID: "feedback-widget"
        };

        window.FB = { 
            ...config, initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, 
            onAuthStateChanged, getFirestore, doc, onSnapshot, updateDoc, increment, 
            setDoc, collection, initializeAppCheck, ReCaptchaV3Provider, setPersistence, browserLocalPersistence
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const DOMAINS = ["uds-net.co.jp", "okinawa-uds.co.jp"];

        function App() {
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState('init'); 
            const [stats, setStats] = useState({ learning: 0, clarity: 0, insight: 0 });
            const [mine, setMine] = useState({});
            const [allPages, setAllPages] = useState([]);
            const [confirmReset, setConfirmReset] = useState(null);
            const [loadTimeout, setLoadTimeout] = useState(false);
            
            const params = new URLSearchParams(window.location.search);
            const pageId = params.get('pid') || "default";
            const pageTitle = params.get('ptitle') || "名称未設定ページ";
            const isAdminMode = params.get('mode') === 'admin';

            useEffect(() => {
                const timeout = setTimeout(() => setLoadTimeout(true), 3000);
                const timer = setInterval(() => {
                    if (window.FB) {
                        initFirebase();
                        clearInterval(timer);
                        clearTimeout(timeout);
                    }
                }, 50);
                return () => { clearInterval(timer); clearTimeout(timeout); };
            }, []);

            const initFirebase = async () => {
                const { initializeApp, getAuth, onAuthStateChanged, firebaseConfig, initializeAppCheck, ReCaptchaV3Provider, RECAPTCHA_SITE_KEY, setPersistence, browserLocalPersistence } = window.FB;
                const app = initializeApp(firebaseConfig);
                try { initializeAppCheck(app, { provider: new ReCaptchaV3Provider(RECAPTCHA_SITE_KEY), isTokenAutoRefreshEnabled: true }); } catch(e) {}
                const auth = getAuth(app);
                await setPersistence(auth, browserLocalPersistence);

                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        const isUDS = u.email && DOMAINS.some(d => u.email.endsWith(d));
                        if (isUDS) {
                            setUser(u);
                            setStatus('auth');
                        } else { setStatus('error'); }
                    } else { setStatus('guest'); }
                }, (err) => { setStatus('error'); });
            };

            const login = async () => {
                const { getAuth, GoogleAuthProvider, signInWithPopup } = window.FB;
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ hd: DOMAINS[0] });
                try {
                    await signInWithPopup(getAuth(), provider);
                } catch (e) {
                    window.open('https://uds-feedback-widget.web.app/?pid=' + pageId + (isAdminMode ? '&mode=admin' : ''), '_blank');
                }
            };

            // Widget購読
            useEffect(() => {
                if (status !== 'auth' || !user || isAdminMode) return;
                const { getFirestore, doc, onSnapshot, setDoc, APP_ID } = window.FB;
                const db = getFirestore();
                
                const unsub1 = onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'feedback', pageId), (s) => {
                    if (s.exists()) setStats(s.data());
                    else setDoc(s.ref, { learning: 0, clarity: 0, insight: 0, title: pageTitle, lastUpdated: Date.now() });
                });
                const unsub2 = onSnapshot(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'my_reactions', pageId), (s) => {
                    if (s.exists()) setMine(s.data());
                });
                return () => { unsub1(); unsub2(); };
            }, [status, user, pageId, isAdminMode]);

            // Admin購読
            useEffect(() => {
                if (status !== 'auth' || !user || !isAdminMode) return;
                const { getFirestore, collection, onSnapshot, APP_ID } = window.FB;
                const db = getFirestore();
                return onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'feedback'), (s) => {
                    setAllPages(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [status, user, isAdminMode]);

            const react = async (type) => {
                if (status !== 'auth') return;
                const { getFirestore, doc, updateDoc, increment, setDoc, APP_ID } = window.FB;
                const db = getFirestore();
                const active = mine[type];
                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'feedback', pageId);
                const myRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'my_reactions', pageId);
                try {
                    await updateDoc(docRef, { [type]: increment(active ? -1 : 1), lastUpdated: Date.now(), title: pageTitle });
                } catch (e) {
                    await setDoc(docRef, { learning: 0, clarity: 0, insight: 0, [type]: 1, lastUpdated: Date.now(), title: pageTitle }, { merge: true });
                }
                await setDoc(myRef, { ...mine, [type]: !active }, { merge: true });
            };

            const resetStats = async (targetId) => {
                const { getFirestore, doc, updateDoc, APP_ID } = window.FB;
                const db = getFirestore();
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'feedback', targetId), {
                    learning: 0, clarity: 0, insight: 0, lastUpdated: Date.now()
                });
                setConfirmReset(null);
            };

            const downloadCSV = () => {
                const head = ['タイトル', 'ID', 'なるほど', 'やってみる', '天才', '最終更新'];
                const rows = allPages.map(p => [p.title || '無題', p.id, p.learning || 0, p.clarity || 0, p.insight || 0, p.lastUpdated ? new Date(p.lastUpdated).toLocaleString() : '-']);
                const csv = "\ufeff" + [head, ...rows].map(r => r.join(",")).join("\n");
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
                link.download = `report_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

            if (status === 'init' && !loadTimeout) return <div className="text-[10px] text-gray-400">認証情報を確認中...</div>;

            if (status !== 'auth') return (
                <div className="flex items-center gap-3 p-2 bg-white/90 backdrop-blur rounded-xl border border-gray-100 shadow-sm">
                    <button onClick={login} className="px-4 py-1.5 bg-slate-800 text-white text-[11px] font-bold rounded-full hover:bg-black transition-all">
                        {status === 'error' ? '🚫 アカウント切替' : '✨ 集計を確認（ログイン）'}
                    </button>
                </div>
            );

            if (isAdminMode) return (
                <div className="p-4 bg-gray-50 min-h-screen text-[11px] text-slate-800 w-full rounded-xl border border-slate-200">
                    <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <h2 className="font-bold text-sm">フィードバック集計</h2>
                            <button onClick={downloadCSV} className="bg-slate-900 text-white px-3 py-1 rounded text-[10px] font-bold">CSV出力</button>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left whitespace-nowrap">
                                <thead><tr className="bg-slate-50 text-slate-400 text-[9px] uppercase tracking-widest">
                                    <th className="p-3 border-b">タイトル / ID</th>
                                    <th className="p-3 border-b text-center">なるほど</th>
                                    <th className="p-3 border-b text-center">やってみる</th>
                                    <th className="p-3 border-b text-center">天才</th>
                                    <th className="p-3 border-b text-center">最終更新</th>
                                    <th className="p-3 border-b text-right">操作</th>
                                </tr></thead>
                                <tbody>{allPages.map(p => (
                                    <tr key={p.id} className="border-b border-slate-50 hover:bg-blue-50/20 transition">
                                        <td className="p-3"><div className="font-bold text-slate-900">{p.title || '無題'}</div><div className="text-[9px] text-slate-400 font-mono">{p.id}</div></td>
                                        <td className="p-3 text-center text-green-600 font-bold">{p.learning || 0}</td>
                                        <td className="p-3 text-center text-orange-600 font-bold">{p.clarity || 0}</td>
                                        <td className="p-3 text-center text-blue-600 font-bold">{p.insight || 0}</td>
                                        <td className="p-3 text-center text-slate-400 text-[9px]">{p.lastUpdated ? new Date(p.lastUpdated).toLocaleDateString() : '-'}</td>
                                        <td className="p-3 text-right">
                                            {confirmReset === p.id ? (
                                                <div className="flex gap-1 justify-end">
                                                    <button onClick={() => resetStats(p.id)} className="bg-red-500 text-white px-2 py-0.5 rounded text-[9px] font-bold">確定</button>
                                                    <button onClick={() => setConfirmReset(null)} className="bg-slate-200 px-2 py-0.5 rounded text-[9px]">戻る</button>
                                                </div>
                                            ) : (
                                                <button onClick={() => setConfirmReset(p.id)} className="text-slate-300 hover:text-red-400 transition">リセット</button>
                                            )}
                                        </td>
                                    </tr>
                                ))}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="widget-panel">
                    <Btn icon="Naruhodo" label="なるほど" count={stats.learning} active={mine.learning} onClick={() => react('learning')} color="text-green-600" cls="btn-naruhodo" />
                    <Btn icon="Yattemiru" label="やってみる" count={stats.clarity} active={mine.clarity} onClick={() => react('clarity')} color="text-orange-600" cls="btn-yattemiru" />
                    <Btn icon="Tensai" label="天才かよ" count={stats.insight} active={mine.insight} onClick={() => react('insight')} color="text-blue-600" cls="btn-tensai" />
                </div>
            );
        }

        const Btn = ({ icon, label, count, active, onClick, color, cls }) => {
            const [ripples, setRipples] = useState([]);
            const addRipple = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                setRipples([...ripples, { id: Date.now(), x: e.clientX - rect.left - size/2, y: e.clientY - rect.top - size/2, s: size }]);
                setTimeout(() => setRipples(rs => rs.slice(1)), 600);
                onClick();
            };
            return (
                <div className={`reaction-container ${cls} ${active ? 'is-active' : ''}`}>
                    <button onClick={addRipple} className={`circle-btn ${active ? color : ''}`}>
                        <div className="ripple-wrapper">
                            {ripples.map(r => <span key={r.id} className="ripple" style={{ top: r.y, left: r.x, width: r.s, height: r.s }} />)}
                        </div>
                        {count > 0 && <div className="flat-dot">{count > 99 ? '99+' : count}</div>}
                        <Icon type={icon} active={active} />
                    </button>
                    <span className="label">{label}</span>
                </div>
            );
        };

        const Icon = ({ type, active }) => {
            const props = { className: "w-7 h-7 z-10", fill: active ? "currentColor" : "none", stroke: "currentColor", strokeWidth: "2" };
            if (type === 'Naruhodo') return (
                <svg {...props} viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5" /><line x1="9" y1="18" x2="15" y2="18" /><line x1="10" y1="22" x2="14" y2="22" /></svg>
            );
            if (type === 'Yattemiru') return (
                <svg {...props} viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" /></svg>
            );
            return (
                <svg {...props} viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" /></svg>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
